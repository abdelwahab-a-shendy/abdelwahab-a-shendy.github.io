<script>
    // ================= التواريخ =================
    function updateDates() {
        const now = new Date();
        // التاريخ الميلادي
        const gregorian = now.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('gregorian-date').innerHTML = `📅 ${gregorian}`;
        
        // التاريخ الهجري - استخدام API مجاني
        fetch('https://api.aladhan.com/v1/gToH?date=' + now.getDate() + '-' + (now.getMonth()+1) + '-' + now.getFullYear())
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    const h = data.data.hijri;
                    document.getElementById('hijri-date').innerHTML = `🕋 ${h.day} ${h.month.ar} ${h.year} هـ`;
                } else {
                    document.getElementById('hijri-date').innerHTML = `🕋 --`;
                }
            })
            .catch(() => {
                document.getElementById('hijri-date').innerHTML = `🕋 --`;
            });
    }
    updateDates();

    // ================= التحكم في حجم الخط =================
    let currentFontSize = 1.5; // rem
    function updateFontSize() {
        document.querySelectorAll('.zekr-text').forEach(el => {
            el.style.fontSize = currentFontSize + 'rem';
        });
        localStorage.setItem('azkar_font_size', currentFontSize);
    }
    
    const savedFontSize = localStorage.getItem('azkar_font_size');
    if (savedFontSize) {
        currentFontSize = parseFloat(savedFontSize);
        updateFontSize();
    }
    
    document.getElementById('font-plus').addEventListener('click', () => {
        if (currentFontSize < 2.2) {
            currentFontSize += 0.1;
            updateFontSize();
        }
    });
    document.getElementById('font-minus').addEventListener('click', () => {
        if (currentFontSize > 0.9) {
            currentFontSize -= 0.1;
            updateFontSize();
        }
    });

    // ================= عرض الإشعار =================
    function showNotification(message) {
        const existingToast = document.querySelector('.toast-notification');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ================= بيانات الأذكار (كاملة كما هي) =================
    const morningAzkar = [
        { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ<br>اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ.", blessing: "من قالها حين يصبح أجير من الجن حتى يمسى ومن قالها حين يمسى أجير من الجن حتى يصبح.", target: 1, source: "آية الكرسى - البقرة 255" },
        { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ.", blessing: "من قالها حين يصبح وحين يمسى كفته من كل شىء (الإخلاص والمعوذتين).", target: 3, source: "سورة الإخلاص" },
        { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ.", blessing: "", target: 3, source: "سورة الفلق" },
        { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ.", blessing: "", target: 3, source: "سورة الناس" },
        { text: "أَصْـبَحْنا وَأَصْـبَحَ المُـلْكُ لله وَالحَمدُ لله ، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُـلكُ ولهُ الحَمْـد، وهُوَ على كلّ شَيءٍ قدير ، رَبِّ أسْـأَلُـكَ خَـيرَ ما في هـذا اليوم وَخَـيرَ ما بَعْـدَه ، وَأَعـوذُ بِكَ مِنْ شَـرِّ ما في هـذا اليوم وَشَرِّ ما بَعْـدَه، رَبِّ أَعـوذُبِكَ مِنَ الْكَسَـلِ وَسـوءِ الْكِـبَر ، رَبِّ أَعـوذُ بِكَ مِنْ عَـذابٍ في النّـارِ وَعَـذابٍ في القَـبْر.", blessing: "", target: 1, source: "دعاء الصباح" },
        { text: "اللّهـمَّ أَنْتَ رَبِّـي لا إلهَ إلاّ أَنْتَ ، خَلَقْتَنـي وَأَنا عَبْـدُك ، وَأَنا عَلـى عَهْـدِكَ وَوَعْـدِكَ ما اسْتَـطَعْـت ، أَعـوذُبِكَ مِنْ شَـرِّ ما صَنَـعْت ، أَبـوءُ لَـكَ بِنِعْـمَتِـكَ عَلَـيَّ وَأَبـوءُ بِذَنْـبي فَاغْفـِرْ لي فَإِنَّـهُ لا يَغْـفِرُ الذُّنـوبَ إِلاّ أَنْتَ .", blessing: "من قالها موقنا بها حين يمسى ومات من ليلته دخل الجنة وكذلك حين يصبح.", target: 1, source: "سيد الاستغفار" },
        { text: "رَضيـتُ بِاللهِ رَبَّـاً وَبِالإسْلامِ ديـناً وَبِمُحَـمَّدٍ صلى الله عليه وسلم نَبِيّـاً.", blessing: "من قالها حين يصبح وحين يمسى كان حقا على الله أن يرضيه يوم القيامة.", target: 3, source: "حديث صحيح" },
        { text: "اللّهُـمَّ إِنِّـي أَصْبَـحْتُ أُشْـهِدُك ، وَأُشْـهِدُ حَمَلَـةَ عَـرْشِـك ، وَمَلَائِكَتَكَ ، وَجَمـيعَ خَلْـقِك ، أَنَّـكَ أَنْـتَ اللهُ لا إلهَ إلاّ أَنْـتَ وَحْـدَكَ لا شَريكَ لَـك ، وَأَنَّ مُحَمّـداً عَبْـدُكَ وَرَسـولُـك.", blessing: "من قالها أعتقه الله من النار.", target: 4, source: "دعاء الصباح" },
        { text: "اللّهُـمَّ ما أَصْبَـحَ بي مِـنْ نِعْـمَةٍ أَو بِأَحَـدٍ مِـنْ خَلْـقِك ، فَمِـنْكَ وَحْـدَكَ لا شريكَ لَـك ، فَلَـكَ الْحَمْـدُ وَلَـكَ الشُّكْـر.", blessing: "من قالها حين يصبح أدى شكر يومه.", target: 1, source: "دعاء الصباح" },

        { text: "أَصْبَـحْـنا عَلَى فِطْرَةِ الإسْلاَمِ، وَعَلَى كَلِمَةِ الإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إبْرَاهِيمَ حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ المُشْرِكِينَ.", blessing: "", target: 1, source: "دعاء الصباح" },

        { text: "اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في الدُّنْـيا وَالآخِـرَة ، اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في ديني وَدُنْـيايَ وَأهْـلي وَمالـي ، اللّهُـمَّ اسْتُـرْ عـوْراتي وَآمِـنْ رَوْعاتـي ، اللّهُـمَّ احْفَظْـني مِن بَـينِ يَدَيَّ وَمِن خَلْفـي وَعَن يَمـيني وَعَن شِمـالي ، وَمِن فَوْقـي ، وَأَعـوذُ بِعَظَمَـتِكَ أَن أُغْـتالَ مِن تَحْتـي.", blessing: "", target: 1, source: "دعاء الصباح" },
        { text: "يَا حَيُّ يَا قيُّومُ بِرَحْمَتِكَ أسْتَغِيثُ أصْلِحْ لِي شَأنِي كُلَّهُ وَلاَ تَكِلْنِي إلَى نَفْسِي طَـرْفَةَ عَيْنٍ.", blessing: "", target: 3, source: "دعاء الصباح" },
        { text: "أَصْبَـحْـنا وَأَصْبَـحْ المُـلكُ للهِ رَبِّ العـالَمـين ، اللّهُـمَّ إِنِّـي أسْـأَلُـكَ خَـيْرَ هـذا الـيَوْم ، فَـتْحَهُ ، وَنَصْـرَهُ ، وَنـورَهُ وَبَـرَكَتَـهُ ، وَهُـداهُ ، وَأَعـوذُ بِـكَ مِـنْ شَـرِّ ما فـيهِ وَشَـرِّ ما بَعْـدَه.", blessing: "", target: 1, source: "دعاء الصباح" },

        { text: "يَا رَبِّ , لَكَ الْحَمْدُ كَمَا يَنْبَغِي لِجَلَالِ وَجْهِكَ , وَلِعَظِيمِ سُلْطَانِكَ.", blessing: "", target: 3, source: "دعاء الصباح" },

        { text: "اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ ، عَلَيْكَ تَوَكَّلْتُ ، وَأَنْتَ رَبُّ الْعَرْشِ الْعَظِيمِ , مَا شَاءَ اللَّهُ كَانَ ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ ، وَلا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ , أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا , اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي ، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا ، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ.", blessing: "ذكر طيب.", target: 1, source: "دعاء الصباح" },

        { text: "أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّاتِ مِن شَرِّ مَا خَلَقَ.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "بِسْمِ اللَّهِ أَرْقِيكَ، مِنْ كُلِّ شَيْءٍ يُؤْذِيكَ، مِنْ شَرِّ كُلِّ نَفْسٍ أَوْ عَيْنِ حَاسِدٍ، اللَّهُ يَشْفِيكَ، بِسْمِ اللَّهِ أَرْقِيكَ.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "بِسْمِ اللَّهِ (ثَلَاثًا)، أَعُوذُ بِاللَّهِ وَقُدْرَتِهِ مِنْ شَرِّ مَا أَجِدُ وَأُحَاذِرُ (سَبْعَ مَرَّاتٍ).", blessing: "", target: 7, source: "السنة النبوية" },
        { text: "أَسْأَلُ اللَّهَ الْعَظِيمَ رَبَّ الْعَرْشِ الْعَظِيمِ، أَنْ يُعَافِيَكَ وَيَشْفِيَكَ.", blessing: "", target: 7, source: "السنة النبوية" },
        { text: "اللَّهُمَّ ربَّ النَّاسِ، أَذْهِب الْبَأسَ، واشْفِ، أَنْتَ الشَّافي لا شِفَاءَ إِلاَّ شِفَاؤُكَ، شِفاءً لا يُغَادِرُ سقَماً.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "اللَّهُمَّ اشْفِ عَبْدَكَ، وَصَدِّقْ رَسُولَك.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "اللهُمَّ بَارِكْ عَلَيْهِ، وَأَذْهِبْ عَنْهُ حَرَّ الْعَيْنِ وَبَرْدَهَا وَوَصَبَهَا.", blessing: "", target: 3, source: "السنة النبوية" },

        { text: "لَا إِلَهَ إِلَّا اللَّهُ الْعَظِيمُ الْحَلِيمُ، لَا إِلَهَ إِلَّا اللَّهُ رَبُّ الْعَرْشِ الْكَرِيمِ، لَا إِلَهَ إِلَّا اللَّهُ رَبُّ السَّمَاوَاتِ وَرَبُّ الْعَرْشِ الْعَظِيمِ.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "رَبّنَا الَّلهُ الذِي فِي السَّمَاءِ، تَقَدَّسَ اسمُكَ، أَمرُكَ فِي السَّمَاءِ وَالأَرْضِ، كَمَا رَحمَتُكَ فِي السَّمَاءِ فَاجْعَلْ رَحْمَتَكَ فِي الأَرْضِ، اغفِر لَنَا حَوْبَنَا وَخَطَايَانَا، أَنتَ رَبُّ الطَّيِّبِينَ، أَنزِلْ رَحْمَةً مِن رَحمَتِكَ، وَشِفَاءً مِن شِفَائِكَ عَلَى هَذَا الوَجَعِ، فَيَبرَأ.", blessing: "تقال ثلاث مرات", target: 3, source: "السنة النبوية" },
        { text: "أَعُوذُ بِوَجْهِ اللَّهِ الْكَرِيمِ، وَبِكَلِمَاتِ اللَّهِ التَّامَّاتِ، اللَّاتِي لَا يُجَاوِزُهُنَّ بَرٌّ وَلَا فَاجِرٌ، مِنْ شَرِّ مَا يَنْزِلُ مِنَ السَّمَاءِ وَشَرِّ مَا يُعْرُجُ فِيهَا، وَشَرِّ مَا ذَرَأَ فِي الْأَرْضِ وَشَرِّ مَا يَخْرُجُ مِنْهَا، وَمِنْ فِتَنِ اللَّيْلِ وَالنَّهَارِ، وَمِنْ طَوَارِقِ اللَّيْلِ وَالنَّهَارِ، إِلَّا طَارِقًا يَطْرُقُ بِخَيْرٍ يَا رَحْمَنُ .", blessing: "", target: 1, source: "السنة النبوية" },
        { text: "بِسـمِ اللهِ الذي لا يَضُـرُّ مَعَ اسمِـهِ شَيءٌ في الأرْضِ وَلا في السّمـاءِ وَهـوَ السّمـيعُ العَلـيم.", blessing: "تقال ثلاث مرات", target: 3, source: "السنة النبوية" },
        { text: "أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّةِ مِنْ غَضَبِهِ وَعِقَابِهِ ، وَشَرِّ عِبَادِهِ ، وَمَنْ هَمَزَاتِ الشَّيَاطِينِ ، وَأَنْ يَحْضُرُونِ.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "بِسْمِ اللَّهِ الْعَظِيمِ ، أَعُوذُ بِاللَّهِ الْكَبِيرِ مِنْ شَرِّ كُلِّ عِرْقٍ نَعَّارٍ ، وَمِنْ شَرِّ حَرِّ النَّارِ.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "بِسْمِ اللهِ تربَةُ أَرْضِنَا، بِرِيقةِ بَعْضِنَا، يُشْفَى سَقِيمُنَا، بإِذْنِ رَبِّنَا.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ بِأَنَّ لَكَ الْحَمْدَ لَا إِلَهَ إِلَّا أَنْتَ، الْمَنَّانُ يَا بَدِيعَ السَّمَاوَاتِ وَالْأَرْضِ، يَا ذَا الْجَلَالِ وَالْإِكْرَامِ، يَا حَيُّ يَا قَيُّومُ.", blessing: "", target: 1, source: "السنة النبوية" },
        { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ بِأَنِّي أَشْهَدُ أَنَّكَ أَنْتَ اللَّه لاَ إِلَهَ إِلاَّ أَنْتَ، الأَحَدُ، الصَّمَدُ، الَّذِي لَمْ يَلِدْ، وَلَمْ يُولَدْ، وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ.", blessing: "", target: 1, source: "السنة النبوية" },
        { text: "اللَّهُمَّ بَرِّدْ قَلْبِي بِالثَّلْجِ وَالْبَرَدِ وَالْمَاءِ الْبَارِدِ ، اللَّهُمَّ نَقِّ قَلْبِي مِنَ الْخَطَايَا كَمَا نَقَّيْتَ الثَّوْبَ الْأَبْيَضَ مِنَ الدَّنَسِ.", blessing: "", target: 1, source: "السنة النبوية" },
        { text: "اللَّهُمَّ إِنِّي أَعُوذُ بِوَجْهِكَ الْكَرِيمِ وَكَلِمَاتِكَ التَّامَّةِ مِنْ شَرِّ مَا أَنْتَ آخِذٌ بِنَاصِيَتِهِ، اللَّهُمَّ أَنْتَ تَكْشِفُ الْمَغْرَمَ وَالْمَأْثَمَ، اللَّهُمَّ لَا يُهْزَمُ جُنْدُكَ، وَلَا يُخْلَفُ وَعْدُكَ، وَلَا يَنْفَعُ ذَا الْجَدِّ مِنْكَ الْجَدُّ، سُبْحَانَكَ وَبِحَمْدِكَ.", blessing: "", target: 1, source: "السنة النبوية" },
        { text: "بِاسْمِ اللَّهِ يُبْرِيكَ، وَمِنْ كُلِّ دَاءٍ يَشْفِيكَ، وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ، وَشَرِّ كُلِّ ذِي عَيْنٍ.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "اللَّهُمَّ اشْفِ عَبْدَكَ يَنْكَأُ لَكَ عَدُوًّا ، أَوْ يَمْشِي لَكَ إِلَى صَلاةٍ.", blessing: "", target: 3, source: "السنة النبوية" },
        { text: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ، اللَّهُمَّ بَارِكْ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ فِي الْعَالَمِينَ إِنَّكَ حَمِيدٌ مَجِيدٌ.", blessing: "الصلاة على النبي - أفضل الذكر", target: 3, source: "الصلاة على النبي" }
    ];

    const STORAGE_KEY = "azkar_complete_v2";
    let currentSection = 'morning';

    function loadProgress(section) {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const all = JSON.parse(saved);
            if (all[section]) return all[section];
        }
        let data;
        if (section === 'morning') data = morningAzkar;
        else if (section === 'evening') data = eveningAzkar;
        else data = ruqyaData;
        return new Array(data.length).fill(0);
    }

    function saveProgress(section, progress) {
        const saved = localStorage.getItem(STORAGE_KEY);
        let all = saved ? JSON.parse(saved) : {};
        all[section] = progress;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    }

    function resetAllInCurrentSection() {
        let data, progress;
        if (currentSection === 'morning') {
            data = morningAzkar;
            progress = new Array(data.length).fill(0);
            saveProgress('morning', progress);
        } else if (currentSection === 'evening') {
            data = eveningAzkar;
            progress = new Array(data.length).fill(0);
            saveProgress('evening', progress);
        } else {
            data = ruqyaData;
            progress = new Array(data.length).fill(0);
            saveProgress('ruqya', progress);
        }
        renderAzkar(currentSection);
        showNotification('🗑️ تم تصفير جميع الأذكار في هذا القسم');
    }

    function renderAzkar(section) {
        currentSection = section;
        const container = document.getElementById('azkar-container');
        let data;
        if (section === 'morning') data = morningAzkar;
        else if (section === 'evening') data = eveningAzkar;
        else data = ruqyaData;
        
        let progress = loadProgress(section);
        
        if (progress.length !== data.length) {
            progress = new Array(data.length).fill(0);
            saveProgress(section, progress);
        }
        
        container.innerHTML = '';
        
        if (section === 'ruqya') {
            const infoDiv = document.createElement('div');
            infoDiv.className = 'info-box';
            infoDiv.innerHTML = `
                <h3>📖 الرقية الشرعية من القرآن والسنة</h3>
                <p>الرقية الشرعية أسباب شرعية للعلاج والاستشفاء والشفاء من الله سبحانه وتعالى ولا يملك أحد من الخلق ضراً ولا نفعاً، ولذلك يجب اللجوء إلى الله سبحانه وتعالى دون سائر الخلق.</p>
                <h3>📖 إرشادات عامة يجب أن تُراعى عند الرقية الشرعية</h3>
                <ul>
                    <li>أن لا يعتقد الراقي أن الرقية تؤثر بذاتها بل بذات الله سبحانه وتعالى.</li>
                    <li>كون الراقي والمرقي على طهارة تامة.</li>
                    <li>استقبال الراقي القبلة.</li>
                    <li>لزوم تدبر الراقي والمرقي لنصوص الرقية.</li>
                    <li>بإمكان الراقي الاقتصار في الرقية على الآيات القرآنية أو التعوذات النبوية.</li>
                    <li>النفث - وهو نفخ لطيف مع بعض ريق - في أثناء القراءة وبعدها.</li>
                    <li>استحسان وضع اليد في أثناء القراءة على موضع الألم.</li>
                    <li>أن ينوي الراقي برقيته نفع أخيه، ومحبة أن يشفيه الله.</li>
                    <li>قد تستمر الرقية لمدة أسبوع كامل حسب حال المريض.</li>
                    <li>إن للراقي القراءة جهرًا أو سرًّا، والجهر أولى.</li>
                </ul>
            `;
            container.appendChild(infoDiv);
        }
        
        data.forEach((item, idx) => {
            const currentCount = progress[idx];
            const target = item.target;
            const isCompleted = currentCount >= target;
            
            const card = document.createElement('div');
            card.className = 'zekr-card';
            if (isCompleted) card.classList.add('completed');
            
            const textDiv = document.createElement('div');
            textDiv.className = 'zekr-text';
            textDiv.innerHTML = item.text;
            textDiv.style.fontSize = currentFontSize + 'rem';
            
            let blessHtml = '';
            if (item.blessing && item.blessing.trim() !== '') {
                blessHtml = `<div class="zekr-bless">💎 ${item.blessing}</div>`;
            }
            
            const sourceHtml = `<div class="zekr-source">📖 ${item.source}</div>`;
            
            const counterArea = document.createElement('div');
            counterArea.className = 'counter-area';
            
            const counterBox = document.createElement('div');
            counterBox.className = 'counter-box';
            
            const decrementBtn = document.createElement('button');
            decrementBtn.className = 'counter-btn';
            decrementBtn.innerHTML = '−';
            
            const countSpan = document.createElement('span');
            countSpan.className = 'counter-value';
            countSpan.innerText = `${currentCount}`;
            
            const incrementBtn = document.createElement('button');
            incrementBtn.className = 'counter-btn';
            incrementBtn.innerHTML = '+';
            
            counterBox.appendChild(decrementBtn);
            counterBox.appendChild(countSpan);
            counterBox.appendChild(incrementBtn);
            
            const targetBadge = document.createElement('span');
            targetBadge.className = 'target-badge';
            targetBadge.innerHTML = `🎯 المطلوب: ${target}`;
            
            const resetBtn = document.createElement('button');
            resetBtn.className = 'reset-btn';
            resetBtn.innerHTML = '⟳ إعادة ضبط';
            
            counterArea.appendChild(counterBox);
            counterArea.appendChild(targetBadge);
            counterArea.appendChild(resetBtn);
            
            card.appendChild(textDiv);
            if (blessHtml) card.insertAdjacentHTML('beforeend', blessHtml);
            card.appendChild(counterArea);
            card.appendChild(document.createElement('div')).innerHTML = sourceHtml;
            
            container.appendChild(card);
            
            function updateUI() {
                countSpan.innerText = `${progress[idx]}`;
                const nowCompleted = progress[idx] >= target;
                if (nowCompleted && !isCompleted) {
                    card.classList.add('completed');
                    card.style.backgroundColor = '#1e2a1e';
                    setTimeout(() => { card.style.backgroundColor = '#1a1a1a'; }, 400);
                    showNotification(`✅ أتممت ذكر: ${item.text.substring(0, 50)}...`);
                } else if (!nowCompleted && isCompleted) {
                    card.classList.remove('completed');
                }
                saveProgress(section, progress);
            }
            
            incrementBtn.onclick = () => {
                if (progress[idx] < target) {
                    progress[idx]++;
                    updateUI();
                }
            };
            
            decrementBtn.onclick = () => {
                if (progress[idx] > 0) {
                    progress[idx]--;
                    updateUI();
                }
            };
            
            resetBtn.onclick = () => {
                progress[idx] = 0;
                updateUI();
            };
        });
    }
    
    // تفعيل التبويبات
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            const section = btn.getAttribute('data-section');
            renderAzkar(section);
        });
    });
    
    // زر تصفير الكل
    document.getElementById('reset-all-btn').addEventListener('click', resetAllInCurrentSection);
    
    // تحميل أذكار الصباح افتراضياً
    renderAzkar('morning');
</script>
